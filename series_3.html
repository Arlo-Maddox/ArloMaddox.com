<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="stylesheet" href="css/pico.zinc.min.css">
  <link rel="stylesheet" href="css/main.css">
  <script>
    document.addEventListener('click', function (e) {
      const targetBtn = e.target.closest('[data-target]');
      if (targetBtn) {
        const target = targetBtn.getAttribute('data-target');
        const dialog = document.getElementById(target);
        if (dialog) dialog.showModal();
      }
      const closeBtn = e.target.closest('[data-close]');
      if (closeBtn) {
        const target = closeBtn.getAttribute('data-target');
        const dialog = document.getElementById(target);
        if (dialog) dialog.close();
      }
    });
  </script>
  <title>Series Three - ARLO MADDOX</title>
</head>

<body>
  <main class="container">
        <nav>
      <ul>
        <li><a href="index.html">
            <h1>Arlo Maddox</h1>
          </a></li>
      </ul>

      <ul>
        <li><button onclick="location.href='contact.html'">Contact</button></li>
      </ul>
    </nav>
    <nav>
      <ul>
        <li>Series:</li>
        <li><a href="series_1.html">One</a></li>
        <li><a href="series_2.html">Two</a></li>
        <li><a href="series_3.html">Three</a></li>
      </ul>
    </nav>
    <h2>Series Three</h2>
    <div class="gallery-grid">
      <button data-target="modal-frost-lilt" class="gallery-btn sold-ribbon"><img src="assets/images/frost-lilt.jpeg" alt=""></button>
      <button data-target="modal-crimson-lattice" class="gallery-btn sold-ribbon"><img src="assets/images/crimson-lattice.jpeg" alt=""></button>
      <button data-target="modal-topaz-swoon" class="gallery-btn sold-ribbon"><img src="assets/images/topaz-swoon.jpeg" alt=""></button>
    </div>
    <dialog class="popover" id="modal-frost-lilt">
      <article>
        <header>
          <button aria-label="Close" rel="prev" data-target="modal-frost-lilt" data-close></button>
        </header>
        <img src="assets/images/frost-lilt.jpeg" alt="">
      </article>
    </dialog>
    <dialog class="popover" id="modal-crimson-lattice">
      <article>
        <header>
          <button aria-label="Close" rel="prev" data-target="modal-crimson-lattice" data-close></button>
        </header>
        <img src="assets/images/crimson-lattice.jpeg" alt="">
      </article>
    </dialog>
    <dialog class="popover" id="modal-topaz-swoon">
      <article>
        <header>
          <button aria-label="Close" rel="prev" data-target="modal-topaz-swoon" data-close></button>
        </header>
        <img src="assets/images/topaz-swoon.jpeg" alt="">
      </article>
    </dialog>
  </main>
</body>

</html>
