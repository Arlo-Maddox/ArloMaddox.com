<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="stylesheet" href="css/pico.zinc.min.css">
  <link rel="stylesheet" href="css/main.css">
  <script>
    document.addEventListener('click', function (e) {
      const targetBtn = e.target.closest('[data-target]');
      if (targetBtn) {
        const target = targetBtn.getAttribute('data-target');
        const dialog = document.getElementById(target);
        if (dialog) dialog.showModal();
      }
      const closeBtn = e.target.closest('[data-close]');
      if (closeBtn) {
        const target = closeBtn.getAttribute('data-target');
        const dialog = document.getElementById(target);
        if (dialog) dialog.close();
      }
    });
  </script>
  <title>Series Two - ARLO MADDOX</title>
</head>

<body>
  <main class="container">
    <nav>
      <ul>
        <li><a href="index.html">
            <h1>Arlo Maddox</h1>
          </a></li>
      </ul>

      <ul>
        <li><button onclick="location.href='contact.html'">Contact</button></li>
      </ul>
    </nav>
    <nav>

    <h2>Series Two</h2>
    <div class="gallery-grid">
