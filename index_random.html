  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const images = [
        'assets/images/cerulean-dream.jpeg', 'assets/images/prism-chorus.jpeg', 'assets/images/sepia-gesture.jpeg', 'assets/images/azure-veil.jpeg',
        'assets/images/sienna-spiral.jpeg', 'assets/images/graphite-haze.jpeg', 'assets/images/vermilion-swirl.jpeg', 'assets/images/golden-echo.jpeg',
        'assets/images/shadow-murmur.jpeg', 'assets/images/alabaster-ripple.jpeg', 'assets/images/moss-reverie.jpeg',
        'assets/images/opaline-wash.jpeg', 'assets/images/lunar-fissure.jpeg', 'assets/images/vermilion-quiet.jpeg',
        'assets/images/ochre-melody.jpeg', 'assets/images/frost-lilt.jpeg', 'assets/images/crimson-lattice.jpeg', 'assets/images/topaz-swoon.jpeg',
        'assets/images/midnight-call.jpeg', 'assets/images/coral-breach.jpeg'
      ];

      const randomImage = images[Math.floor(Math.random() * images.length)];
      const container = document.querySelector('main.container');
      const imgElement = document.createElement('img');
      imgElement.src = randomImage;
      imgElement.style.width = '100%';
      imgElement.style.display = 'block';
      container.appendChild(imgElement);
    });
  </script>
